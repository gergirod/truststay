name: Refresh by Activity

on:
  workflow_dispatch:
    inputs:
      activity:
        description: "Activity to refresh"
        required: true
        type: choice
        options:
          - surf
          - dive
          - hike
          - yoga
          - kite
          - work_first
          - exploring
          - all
      destination:
        description: "Optional single destination slug override (e.g. popoyo)"
        required: false
        type: string
      limit:
        description: "Optional cap on number of destinations"
        required: false
        default: "0"
        type: string
      dry_run:
        description: "Run without calling refresh pipeline"
        required: true
        default: false
        type: boolean

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      NODE_ENV: production
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run manual refresh
        env:
          INPUT_ACTIVITY: ${{ github.event.inputs.activity }}
          INPUT_DESTINATION: ${{ github.event.inputs.destination }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          ACTIVITY="$INPUT_ACTIVITY"
          DEST="$INPUT_DESTINATION"
          LIMIT="$INPUT_LIMIT"
          DRY="$INPUT_DRY_RUN"

          CMD="npm run refresh:activity -- --activity ${ACTIVITY}"

          if [ -n "$DEST" ]; then
            CMD="$CMD --destination $DEST"
          fi

          if [ -n "$LIMIT" ] && [ "$LIMIT" != "0" ]; then
            CMD="$CMD --limit $LIMIT"
          fi

          if [ "$DRY" = "true" ]; then
            CMD="$CMD --dry-run"
          fi

          echo "Running: $CMD"
          eval "$CMD"

