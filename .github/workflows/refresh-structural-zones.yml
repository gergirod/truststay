name: Refresh Structural Zones

on:
  workflow_dispatch:
    inputs:
      activity:
        description: "Activity to structurally re-evaluate"
        required: true
        default: surf
        type: choice
        options:
          - surf
          - dive
          - hike
          - yoga
          - kite
          - work_first
          - exploring
          - all
      destination:
        description: "Optional single destination slug override"
        required: false
        type: string
      limit:
        description: "Optional cap when running by activity"
        required: false
        default: "25"
        type: string
      dry_run:
        description: "Dry run only"
        required: true
        default: false
        type: boolean

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      - name: Structural refresh by destination
        if: ${{ github.event.inputs.destination != '' }}
        run: |
          CMD="npm run refresh:destination -- --destination ${{ github.event.inputs.destination }} --activity ${{ github.event.inputs.activity }} --structural"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          echo "Running: $CMD"
          eval "$CMD"

      - name: Structural refresh by activity batch
        if: ${{ github.event.inputs.destination == '' }}
        run: |
          ACTIVITY="${{ github.event.inputs.activity }}"
          LIMIT="${{ github.event.inputs.limit }}"
          DRY="${{ github.event.inputs.dry_run }}"
          CMD="npm run refresh:activity -- --activity $ACTIVITY --limit ${LIMIT:-25}"
          if [ "$DRY" = "true" ]; then
            CMD="$CMD --dry-run"
          fi
          echo "Running: $CMD"
          eval "$CMD"

